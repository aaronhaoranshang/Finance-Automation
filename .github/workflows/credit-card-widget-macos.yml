name: Build Credit Card Due for macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "credit-card-widget-v*"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: Apple Silicon
            package: Apple-Silicon
          - runner: macos-15-intel
            label: Intel
            package: Intel

    defaults:
      run:
        working-directory: credit-card-widget

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_BASE64" ]]; then
            echo "No signing certificate configured; building unsigned."
            exit 0
          fi
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$MACOS_CERTIFICATE_BASE64" \
            | openssl base64 -d -A \
            > "$CERTIFICATE_PATH"
          security create-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security set-keychain-settings \
            -lut 21600 \
            "$KEYCHAIN_PATH"
          security unlock-keychain \
            -p "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Set app version
        run: |
          APP_VERSION="1.0.2"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            APP_VERSION="${GITHUB_REF_NAME#credit-card-widget-v}"
          fi
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Build and verify app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: ./scripts/build_macos.sh

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Credit-Card-Due-macOS-${{ matrix.package }}
          path: credit-card-widget/dist/Credit Card Due-macOS-${{ matrix.package }}.zip
          if-no-files-found: error
