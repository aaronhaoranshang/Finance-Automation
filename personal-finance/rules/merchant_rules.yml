# Merchant categorization rules are evaluated top to bottom.
# match_type can be: exact, contains, regex.
- pattern: "CONGEE QUEEN"
  match_type: "contains"
  merchant_clean: "Congee Queen"
  category: "Food"
  subcategory: "Dining"
- pattern: "UBER EATS"
  match_type: "contains"
  merchant_clean: "Uber Eats"
  category: "Food"
  subcategory: "Delivery"
- pattern: "AIR CANADA"
  match_type: "contains"
  merchant_clean: "Air Canada"
  category: "Travel"
  subcategory: "Flight"
